<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main rounded square background -->
  <rect width="192" height="192" rx="48" fill="url(#bgGradient)"/>
  
  <!-- Inner accent circle -->
  <circle cx="96" cy="96" r="85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Shopping cart icon as accent -->
  <g transform="translate(96, 45)" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart -->
    <path d="M 1 1 L 4 18 C 4 19 5 20 6 20 L 20 20 C 21 20 22 19 22 18 L 25 1" stroke-width="2.5"/>
    <circle cx="9" cy="25" r="1.5" fill="white"/>
    <circle cx="19" cy="25" r="1.5" fill="white"/>
  </g>
  
  <!-- BizFlow text -->
  <text x="96" y="125" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" text-anchor="middle" fill="url(#textGradient)" letter-spacing="-0.5">BizFlow</text>
  
  <!-- Decorative dots -->
  <circle cx="35" cy="40" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="157" cy="150" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="160" cy="50" r="2" fill="rgba(255,255,255,0.2)"/>
</svg>