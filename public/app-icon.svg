<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  
  <!-- Top accent bar -->
  <rect width="512" height="80" rx="120" fill="url(#accentGradient)" opacity="0.3"/>
  
  <!-- Shopping cart icon - stylized -->
  <g transform="translate(256, 220)">
    <!-- Cart body outline -->
    <path d="M -95 -40 L -75 60 C -70 80 -55 90 -35 90 L 140 90 C 160 90 175 80 180 60 L 200 -40 Z" 
          fill="none" stroke="white" stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Cart handle -->
    <path d="M -55 -40 Q -55 -130 0 -145 Q 55 -130 55 -40" 
          fill="none" stroke="white" stroke-width="18" stroke-linecap="round"/>
    
    <!-- Wheels -->
    <circle cx="-60" cy="110" r="22" fill="none" stroke="white" stroke-width="16"/>
    <circle cx="140" cy="110" r="22" fill="none" stroke="white" stroke-width="16"/>
    
    <!-- Center accent line -->
    <line x1="-35" y1="-40" x2="-35" y2="60" stroke="url(#accentGradient)" stroke-width="12" opacity="0.6"/>
  </g>
  
  <!-- BizFlow text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="white">
    BizFlow
  </text>
  
  <!-- Subtitle -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="url(#accentGradient)">
    POS
  </text>
</svg>
